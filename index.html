<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسم المؤسسه</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111111;
            margin: 0;
            padding: 0;
            color: #e5e5e5;
        }

        /* ستايل نافذة الاختيار (جوال أو كمبيوتر) */
        .device-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .modal-content h2 {
            color: #d4af37;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .modal-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .modal-btn {
            background-color: #d4af37;
            color: #111;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 120px;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        header {
            background-color: #1a1a1a;
            border-bottom: 3px solid #d4af37;
            color: #d4af37;
            text-align: center;
            padding: 30px;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: 2px solid #d4af37;
            background-color: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .product-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #d4af37;
            text-align: center;
        }

        .product-card.hidden {
            display: none !important;
        }

        .price {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .quantity-selector {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .quantity-selector input {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #d4af37;
            background: #111;
            color: #fff;
            text-align: center;
        }

        button {
            background-color: #d4af37;
            color: #111111;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-section {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #d4af37;
            max-width: 500px;
            margin: 40px auto;
            text-align: right;
        }

        .cart-section h2 {
            color: #d4af37;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
            text-align: center;
        }

        #box-list {
            list-style: none;
            padding: 0;
            color: #ffffff;
        }

        #box-list li {
            padding: 12px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        .cart-total {
            margin: 25px 0;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .cart-total strong {
            font-size: 1.3rem;
            color: #d4af37;
            display: flex;
            justify-content: space-between;
        }

        .send-btn {
            width: 100%;
            background-color: #25D366;
            color: white;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        /* 📱 وضع الجوال الذكي: يتم تفعيله تلقائياً عند اختيار الجوال لتعديل القياسات */
        body.mobile-mode .products-container {
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)) !important;
            gap: 12px !important;
            padding: 5px;
        }

        body.mobile-mode .product-card {
            padding: 12px !important;
        }

        body.mobile-mode .search-input {
            width: 95%;
            font-size: 1rem;
        }

        body.mobile-mode main {
            padding: 10px !important;
            margin: 10px auto !important;
        }
    </style>
</head>
<body>

    <div class="device-modal" id="deviceModal">
        <div class="modal-content">
            <h2>اختر نوع جهازك لتصفح أفضل:</h2>
            <div class="modal-btns">
                <button class="modal-btn" onclick="setDevice('pc')">💻 كمبيوتر</button>
                <button class="modal-btn" onclick="setDevice('mobile')">📱 جوال</button>
            </div>
        </div>
    </div>

    <header>
        <h1>اسم المؤسسه</h1>
        <p>موقع لتصفح المنتجات  ولا يوجد دفع فقط للتواصل</p>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-bar" class="search-input" placeholder="🔍 ابحث باسم المنتج أو الكلمات المفتاحية..." oninput="searchProducts()">
        </div>

        <section class="products-container" id="products-wrapper">
            
            <div class="product-card" data-keywords="سريع مشهور افكورو ترند">
                <h3>افكورو</h3>
                <p class="price">150 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v1" value="1" min="1">
                </div>
                <button onclick="put('افكورو', 150, 'v1')">إضافة للسلة 🛒</button>
            </div>

            <div class="product-card" data-keywords="سريع مشهور تيك توك ترند">
                <h3>تك توك</h3>
                <p class="price">90 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v2" value="1" min="1">
                </div>
                <button onclick="put('تك توك', 90, 'v2')">إضافة للسلة 🛒</button>
            </div>

            <div class="product-card" data-keywords="بارد شتوي فخم ملكي قماش">
                <h3>اوكراني</h3>
                <p class="price">140 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v3" value="1" min="1">
                </div>
                <button onclick="put('اوكراني', 140, 'v3')">إضافة للسلة 🛒</button>
            </div>
            
            <div class="product-card" data-keywords="صيني اقتصادي شحن سريع رخيص">
                <h3>سي واي</h3>
                <p class="price">90 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v4" value="1" min="1">
                </div>
                <button onclick="put('سي واي', 90, 'v4')">إضافة للسلة 🛒</button>
            </div>
        
            <div class="product-card" data-keywords="صيني اقتصادي نسخة جديدة">
                <h3>سمير اميس</h3>
                <p class="price">90 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v5" value="1" min="1">
                </div>
                <button onclick="put('سي واي', 90, 'v5')">إضافة للسلة 🛒</button>
            </div>

            <div class="product-card" data-keywords="صيني اقتصادي قديم كلاسيك">
                <h3> سي واي بحريني</h3>
                <p class="price">90 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v6" value="1" min="1">
                </div>
                <button onclick="put('سي واي', 90, 'v6')">إضافة للسلة 🛒</button>
            </div>
        </section>

        <section class="cart-section">
            <h2>المنتجات</h2>
            <ul id="box-list">
                <li id="empty-msg" style="text-align: center; border-bottom: none; display: block;">السلة فارغة حالياً</li>
            </ul>

            <div class="cart-total">
                <strong><span>الإجمالي النهائي:</span> <span><span id="total-price">0.00</span> ريال</span></strong>
            </div>
            <button class="send-btn" onclick="send()">إرسال الطلب عبر الواتساب 💬</button>
        </section>

    </main>

    <script>
        let money = 0;
        let active = false;

        // دالة تحديد الجهاز وضبط القياسات فوراً
        function setDevice(type) {
            const modal = document.getElementById('deviceModal');
            if (type === 'mobile') {
                document.body.classList.add('mobile-mode'); // تفعيل وضع الجوال المتناسق
            } else {
                document.body.classList.remove('mobile-mode'); // تفعيل وضع الكمبيوتر العادي
            }
            modal.style.display = 'none'; // إخفاء النافذة بعد الاختيار
        }

        function put(name, num, id) {
            const input = document.getElementById(id);
            let count = parseInt(input.value) || 1;

            if (count < 1) { count = 1; }

            if (!active) {
                document.getElementById('empty-msg').style.display = 'none';
                active = true;
            }

            const line = num * count;
            const list = document.getElementById('box-list');
            
            const li = document.createElement('li');
            li.innerHTML = `<span>${name} (x${count})</span> <span>${line.toFixed(2)} ريال</span>`;
            list.appendChild(li);

            money += line;
            document.getElementById('total-price').textContent = money.toFixed(2);

            input.value = 1;
        }

        function searchProducts() {
            const filter = document.getElementById('search-bar').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const productName = card.querySelector('h3').textContent.toLowerCase();
                const keywords = card.getAttribute('data-keywords') ? card.getAttribute('data-keywords').toLowerCase() : '';

                if (productName.includes(filter) || keywords.includes(filter)) {
                    card.classList.remove('hidden'); 
                } else {
                    card.classList.add('hidden'); 
                }
            });
        }

        function send() {
            if (money === 0) {
                alert('الرجاء إضافة منتجات أولاً!');
                return;
            }

            const phone = "966505663899"; 
            let msg = "السلام عليكم ورحمة الله، أريد طلب المنتجات التالية:\n\n";
            
            const all = document.querySelectorAll('#box-list li');
            let n = 1;
            
            all.forEach((item) => {
                if (item.id !== 'empty-msg') {
                    msg += `${n}. ${item.innerText}\n`;
                    n++;
                }
            });

            msg += `\n------------------`;
            msg += `\n*الإجمالي النهائي:* ${money.toFixed(2)} ريال`;

            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
