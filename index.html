<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اقمشة بيرق الجود</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111111;
            margin: 0;
            padding: 0;
            color: #e5e5e5;
        }

        header {
            background-color: #1a1a1a;
            border-bottom: 3px solid #d4af37;
            color: #d4af37;
            text-align: center;
            padding: 30px;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .product-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #d4af37;
            text-align: center;
        }

        .price {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .quantity-selector {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .quantity-selector input {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #d4af37;
            background: #111;
            color: #fff;
            text-align: center;
        }

        button {
            background-color: #d4af37;
            color: #111111;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-section {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #d4af37;
            max-width: 500px;
            margin: 0 auto;
            text-align: right;
        }

        .cart-section h2 {
            color: #d4af37;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
            text-align: center;
        }

        #box-list {
            list-style: none;
            padding: 0;
            color: #ffffff;
        }

        #box-list li {
            padding: 12px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        .cart-total {
            margin: 25px 0;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .cart-total strong {
            font-size: 1.3rem;
            color: #d4af37;
            display: flex;
            justify-content: space-between;
        }

        .send-btn {
            width: 100%;
            background-color: #25D366;
            color: white;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>بيرق الجود</h1>
        <p>حدد كمية أي منتج واضغط إضافة للسلة ليتم الحساب تلقائياً</p>
    </header>

    <main>
        <section class="products-container">
            
            <div class="product-card">
                <h3>ساعة ذكية</h3>
                <p class="price">150 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v1" value="1" min="1">
                </div>
                <button onclick="put('ساعة ذكية', 150, 'v1')">إضافة للسلة 🛒</button>
            </div>

             <div class="product-card">
                <h3>ساعة ذكية</h3>
                <p class="price">150 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v1" value="1" min="1">
                </div>
                <button onclick="put('ساعة ذكية', 150, 'v2')">إضافة للسلة 🛒</button>
            </div>


            <div class="product-card">
                <h3>سمير اميس</h3>
                <p class="price">200 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v3" value="1" min="1">
                </div>
                  <div class="product-card">
                <h3>سمير اميس</h3>
                <p class="price">200 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v4" value="1" min="1">
                </div>
                        <div class="product-card">
                <h3>سمير اميس</h3>
                <p class="price">200 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v5" value="1" min="1">
                </div>
                <button onclick="put('سماعات لاسلكية', 200, 'v2')">إضافة للسلة 🛒</button>
            </div>

            <div class="product-card">
                <h3>شاحن سريع</h3>
                <p class="price">50 ريال</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v6" value="1" min="1">
                </div>
                <button onclick="put('شاحن سريع', 50, 'v3')">إضافة للسلة 🛒</button>
            </div>

                      <div class="product-card">
                <h3>اسي واي</h3>
                <p class="price">90</p>
                <div class="quantity-selector">
                    <label>العدد:</label>
                    <input type="number" id="v7" value="1" min="1">
                </div>
                <button onclick="put('اسم المنتج هنا', السعر, 'v4')">إضافة للسلة 🛒</button>
            </div>
                      
        </section>

        <section class="cart-section">
            <h2>سلة التسوق 🛍️</h2>
            <ul id="box-list">
                <li id="empty-msg" style="text-align: center; border-bottom: none; display: block;">السلة فارغة حالياً</li>
            </ul>

            <div class="cart-total">
                <strong><span>الإجمالي النهائي:</span> <span><span id="total-price">0.00</span> ريال</span></strong>
            </div>
            <button class="send-btn" onclick="send()">إرسال الطلب عبر الواتساب 💬</button>
        </section>
    </main>

    <script>
        let money = 0;
        let active = false;

        function put(name, num, id) {
            const input = document.getElementById(id);
            let count = parseInt(input.value) || 1;

            if (count < 1) { count = 1; }

            if (!active) {
                document.getElementById('empty-msg').style.display = 'none';
                active = true;
            }

            const line = num * count;
            const list = document.getElementById('box-list');
            
            const li = document.createElement('li');
            li.innerHTML = `<span>${name} (x${count})</span> <span>${line.toFixed(2)} ريال</span>`;
            list.appendChild(li);

            money += line;
            document.getElementById('total-price').textContent = money.toFixed(2);

            input.value = 1;
        }

        function send() {
            if (money === 0) {
                alert('الرجاء إضافة منتجات أولاً!');
                return;
            }

            const phone = "966530984099"; 
            let msg = "السلام عليكم ورحمة الله وبركاته، لقد طلبت المنتجات التالية:\n\n";
            
            const all = document.querySelectorAll('#box-list li');
            let n = 1;
            
            all.forEach((item) => {
                if (item.id !== 'empty-msg') {
                    msg += `${n}. ${item.innerText}\n`;
                    n++;
                }
            });

            msg += `\n------------------`;
            msg += `\n*الإجمالي النهائي:* ${money.toFixed(2)} ريال`;

            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
